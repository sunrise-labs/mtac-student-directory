<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        === META TAGS ===
        These tell the browser important info about our page.
        - charset: what characters we use (UTF-8 supports all languages)
        - viewport: makes the page work well on phones and tablets
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- This is the title that shows in the browser tab -->
    <title>Mauke Tech Academy - Kau Mapu 2026</title>

    <!--
        === LINKING OUR CSS FILE ===
        This connects our separate stylesheet (styles.css) to this HTML page.
        "rel" means relationship — it's a stylesheet.
        "href" is the path to the file.
    -->
    <link rel="stylesheet" href="styles.css">

    <!--
        === GOOGLE FONTS ===
        We load two fonts from Google Fonts (free to use):
        - "Oswald" for headings (bold, condensed, matches our logo style)
        - "Inter" for body text (clean, modern, very readable)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
</head>
